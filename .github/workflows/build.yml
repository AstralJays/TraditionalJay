name: Build

# Compiles the Spring Boot fat JAR. On version tags, publishes a GitHub Release
# so VMs can install without building on-box (see scripts/install-vm.sh).

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Maven package
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Build
        run: mvn -B -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: traditional-jay-jar
          path: app/target/traditional-jay-*.jar
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          JAR=$(ls target/traditional-jay-*.jar | head -1)
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" "$JAR" \
            --repo "${{ github.repository }}" \
            --title "TraditionalJay ${TAG}" \
            --notes "Spring Boot fat JAR with Log4j 2.14.1 (CVE-2021-44228 workshop build)." \
            --verify-tag
