name: Build

# Compiles the Spring Boot fat JAR and scans the Docker image with Upwind Shift Left.
# On version tags, also publishes a GitHub Release JAR for VM installs.

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

env:
  IMAGE_NAME: traditionaljay

jobs:
  build:
    name: Maven package
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Build
        run: mvn -B -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: traditional-jay-jar
          path: app/target/traditional-jay-*.jar
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          JAR=$(ls target/traditional-jay-*.jar | head -1)
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" "$JAR" \
            --repo "${{ github.repository }}" \
            --title "TraditionalJay ${TAG}" \
            --notes "Spring Boot fat JAR with Log4j 2.14.1 (CVE-2021-44228 workshop build)." \
            --verify-tag

  upwind-scan:
    name: Upwind image scan
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Check Upwind credentials
        id: creds
        env:
          UPWIND_CLIENT_ID: ${{ secrets.UPWIND_CLIENT_ID }}
          UPWIND_CLIENT_SECRET: ${{ secrets.UPWIND_CLIENT_SECRET }}
        run: |
          if [ -z "$UPWIND_CLIENT_ID" ] || [ -z "$UPWIND_CLIENT_SECRET" ]; then
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "::warning::UPWIND_CLIENT_ID/SECRET missing — skipping Shift Left scan. Add repo Actions secrets to enable."
          else
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.has_creds == 'true'

      - name: Set up Docker Buildx
        if: steps.creds.outputs.has_creds == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build image
        if: steps.creds.outputs.has_creds == 'true'
        id: image
        run: |
          TAG="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$TAG" ./app
          echo "ref=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Shift Left Image Scan
        if: steps.creds.outputs.has_creds == 'true'
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: ${{ steps.image.outputs.ref }}
          pull_image: false
          use_sudo: false
          commit_sha: ${{ github.sha }}
